apiVersion: apps/v1
kind: Deployment
metadata:
  name: calunga-release-watcher
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: calunga-release-watcher
  template:
    metadata:
      labels:
        app: calunga-release-watcher
    spec:
      containers:
        - name: controller
          image: quay.io/rhopp/calunga-release-watcher:latest
          envFrom:
            - configMapRef:
                name: calunga-release-watcher-config
          env:
            - name: K8S_TOKEN
              valueFrom:
                secretKeyRef:
                  name: calunga-release-watcher-secrets
                  key: k8s-token
            - name: SLACK_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: calunga-release-watcher-secrets
                  key: slack-token
                  optional: true
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: /var/run/secrets/gcp/sa-key.json
          volumeMounts:
            - name: gcp-sa-key
              mountPath: /var/run/secrets/gcp
              readOnly: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: gcp-sa-key
          secret:
            secretName: calunga-release-watcher-secrets
            items:
              - key: gcp-sa-key
                path: sa-key.json
            optional: true
